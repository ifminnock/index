<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Projection Reference Guide — MFI Alaska Geo Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–page-bg:    #2E3A47;
–card-bg:    #3A4A5C;
–accent:     #D4651A;
–grey-blue:  #4A6070;
–text-1:     #E8EAEC;
–text-2:     #9AAABB;
–row-alt:    #344455;
–font:       ‘IBM Plex Mono’, ‘Courier New’, Consolas, monospace;
}

html, body {
height: 100%;
background: var(–page-bg);
color: var(–text-1);
font-family: var(–font);
font-size: 0.92rem;
line-height: 1.55;
}

/* ── HEADER ── */
header {
background: var(–page-bg);
border-bottom: 2px solid var(–accent);
padding: 0.75rem 1.5rem;
display: flex;
align-items: baseline;
gap: 1.5rem;
flex-wrap: wrap;
}
header a.back {
color: var(–text-2);
text-decoration: none;
font-size: 0.82rem;
white-space: nowrap;
transition: color 0.15s;
}
header a.back:hover { color: var(–accent); }
header .title-block { flex: 1; }
header .module-label {
font-size: 0.72rem;
color: var(–text-2);
letter-spacing: 0.08em;
text-transform: uppercase;
}
header h1 {
font-size: 1.25rem;
color: var(–accent);
font-weight: 700;
line-height: 1.2;
}

/* ── THREE-COLUMN LAYOUT ── */
.app-shell {
display: grid;
grid-template-columns: 240px 1fr 280px;
height: calc(100vh - 60px);
overflow: hidden;
}

/* ── LEFT COLUMN — projection list ── */
.col-list {
background: var(–card-bg);
border-right: 1px solid var(–grey-blue);
overflow-y: auto;
padding: 0;
}
.family-header {
background: var(–page-bg);
color: var(–text-2);
font-size: 0.68rem;
letter-spacing: 0.1em;
text-transform: uppercase;
padding: 0.55rem 0.9rem 0.35rem;
border-bottom: 1px solid var(–grey-blue);
position: sticky;
top: 0;
z-index: 1;
}
.proj-item {
padding: 0.6rem 0.9rem;
cursor: pointer;
border-bottom: 1px solid rgba(74,96,112,0.35);
color: var(–text-1);
font-size: 0.82rem;
line-height: 1.3;
transition: background 0.12s, color 0.12s;
user-select: none;
}
.proj-item:hover {
background: rgba(212,101,26,0.15);
color: var(–text-1);
}
.proj-item.active {
background: rgba(212,101,26,0.22);
color: var(–accent);
border-left: 3px solid var(–accent);
padding-left: calc(0.9rem - 3px);
}
.proj-item .proj-tag {
font-size: 0.65rem;
color: var(–text-2);
display: block;
margin-top: 0.1rem;
}
.proj-item.active .proj-tag { color: rgba(212,101,26,0.75); }

/* ── CENTER COLUMN — detail ── */
.col-detail {
overflow-y: auto;
padding: 1.5rem;
background: var(–page-bg);
}
.col-detail h2 {
color: var(–accent);
font-size: 1.2rem;
margin-bottom: 0.35rem;
}
.col-detail .proj-subtitle {
color: var(–text-2);
font-size: 0.78rem;
margin-bottom: 1.1rem;
letter-spacing: 0.04em;
}
.thumbnail-wrap {
display: inline-block;
cursor: zoom-in;
border: 1px solid var(–grey-blue);
border-radius: 3px;
overflow: hidden;
margin-bottom: 1.2rem;
transition: border-color 0.15s;
background: #1e2a35;
}
.thumbnail-wrap:hover { border-color: var(–accent); }
.thumbnail-wrap svg { display: block; }
.zoom-hint {
font-size: 0.68rem;
color: var(–text-2);
margin-bottom: 1.2rem;
margin-top: -0.8rem;
}

.section-block { margin-bottom: 1.2rem; }
.section-block h3 {
font-size: 0.78rem;
text-transform: uppercase;
letter-spacing: 0.08em;
color: var(–accent);
margin-bottom: 0.4rem;
border-bottom: 1px solid var(–grey-blue);
padding-bottom: 0.2rem;
}
.section-block p {
color: var(–text-1);
font-size: 0.87rem;
line-height: 1.6;
}

/* ── RIGHT COLUMN — metadata card ── */
.col-meta {
background: var(–card-bg);
border-left: 1px solid var(–grey-blue);
overflow-y: auto;
padding: 1.2rem 1rem;
}
.meta-card h3 {
font-size: 0.72rem;
text-transform: uppercase;
letter-spacing: 0.1em;
color: var(–accent);
margin-bottom: 0.8rem;
border-bottom: 1px solid var(–grey-blue);
padding-bottom: 0.3rem;
}
.meta-row {
display: grid;
grid-template-columns: auto 1fr;
gap: 0.3rem 0.7rem;
margin-bottom: 0.55rem;
align-items: start;
}
.meta-label {
font-size: 0.7rem;
color: var(–text-2);
text-transform: uppercase;
letter-spacing: 0.06em;
white-space: nowrap;
padding-top: 0.05rem;
}
.meta-value {
font-size: 0.82rem;
color: var(–text-1);
line-height: 1.4;
}
.meta-value.epsg code {
background: var(–page-bg);
color: var(–accent);
padding: 0.05em 0.3em;
border-radius: 2px;
font-size: 0.78rem;
display: inline-block;
margin: 0.1em 0.15em 0.1em 0;
}
.alaska-note {
margin-top: 1rem;
background: rgba(212,101,26,0.1);
border-left: 3px solid var(–accent);
padding: 0.6rem 0.75rem;
border-radius: 0 3px 3px 0;
}
.alaska-note .ak-label {
font-size: 0.68rem;
text-transform: uppercase;
letter-spacing: 0.08em;
color: var(–accent);
margin-bottom: 0.3rem;
}
.alaska-note p {
font-size: 0.8rem;
color: var(–text-1);
line-height: 1.5;
}
.distortion-bar {
margin-top: 0.5rem;
}
.distort-label {
font-size: 0.68rem;
color: var(–text-2);
text-transform: uppercase;
letter-spacing: 0.06em;
margin-bottom: 0.3rem;
}
.distort-pill {
display: inline-block;
background: var(–grey-blue);
color: var(–text-1);
font-size: 0.7rem;
padding: 0.15em 0.5em;
border-radius: 2px;
margin: 0.15em 0.2em 0.15em 0;
line-height: 1.3;
}
.distort-pill.high { background: rgba(180,60,30,0.7); }
.distort-pill.med  { background: rgba(180,140,30,0.6); }
.distort-pill.low  { background: rgba(60,130,80,0.55); }

/* ── LIGHTBOX ── */
.lightbox {
display: none;
position: fixed;
inset: 0;
background: rgba(10,16,22,0.88);
z-index: 1000;
align-items: center;
justify-content: center;
}
.lightbox.open { display: flex; }
.lightbox-inner {
position: relative;
background: #1e2a35;
border: 1px solid var(–grey-blue);
border-radius: 4px;
padding: 0.5rem;
}
.lightbox-inner svg { display: block; }
.lb-close {
position: absolute;
top: -0.6rem;
right: -0.6rem;
width: 1.5rem;
height: 1.5rem;
background: var(–accent);
color: #fff;
border: none;
border-radius: 50%;
cursor: pointer;
font-size: 0.85rem;
line-height: 1;
display: flex;
align-items: center;
justify-content: center;
font-family: var(–font);
font-weight: 700;
}
.lb-close:hover { background: #b5541a; }

/* ── FOOTER ── */
footer {
background: var(–page-bg);
border-top: 1px solid var(–grey-blue);
padding: 0.55rem 1.5rem;
font-size: 0.7rem;
color: var(–text-2);
display: flex;
gap: 2rem;
flex-wrap: wrap;
}

/* ── SCROLLBAR STYLING ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(–page-bg); }
::-webkit-scrollbar-thumb { background: var(–grey-blue); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(–accent); }

/* ── RESPONSIVE ── */
@media (max-width: 860px) {
.app-shell {
grid-template-columns: 1fr;
grid-template-rows: auto auto auto;
height: auto;
overflow: visible;
}
.col-list  { max-height: 280px; border-right: none; border-bottom: 1px solid var(–grey-blue); }
.col-detail { height: auto; }
.col-meta  { border-left: none; border-top: 1px solid var(–grey-blue); }
}
</style>

</head>
<body>

<header>
  <a href="../tool-index.html" class="back">&#8592; Index</a>
  <div class="title-block">
    <div class="module-label">GIS Tools &mdash; Alaska Geotechnical Tools</div>
    <h1>Map Projection Reference Guide</h1>
  </div>
</header>

<div class="app-shell">
  <div class="col-list" id="projList"></div>
  <div class="col-detail" id="projDetail"></div>
  <div class="col-meta"  id="projMeta"></div>
</div>

<footer>
  <span>Independent personal project &mdash; not affiliated with Alaska DOT&PF or any government agency. Tool outputs are reference aids only.</span>
  <span>Ian Minnock, CPG, PMP, PMI-ACP &mdash; ifminnock.github.io/index</span>
</footer>

<!-- Lightbox -->

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner" id="lbInner">
    <button class="lb-close" id="lbClose">&#x2715;</button>
  </div>
</div>

<script>
// ============================================================
//  SVG GRATICULE GENERATOR
//  Produces characteristic grid shape for each projection
// ============================================================

function makeSVG(type, w, h) {
  // Returns an SVG string for the given projection type
  const ns = 'http://www.w3.org/2000/svg';
  let paths = '';
  const bg   = '#1e2a35';
  const grid = '#2E6080';
  const land = '#2A4A3C';
  const eq   = '#D4651A';

  // helper: clamp
  function cl(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

  // ── MERCATOR / WEB MERCATOR ──
  if (type === 'mercator') {
    const mx = w * 0.1, my = h * 0.05;
    const iw = w - mx*2, ih = h - my*2;
    let p = '';
    // meridians (straight vertical)
    for (let lon = -180; lon <= 180; lon += 30) {
      const x = mx + (lon + 180) / 360 * iw;
      p += `M ${x} ${my} L ${x} ${my+ih} `;
    }
    // parallels — Mercator: lat spacing grows toward poles
    for (let lat = -80; lat <= 80; lat += 30) {
      const y = my + ih/2 - (Math.log(Math.tan(Math.PI/4 + lat*Math.PI/360)) / Math.log(Math.tan(Math.PI/4 + 80*Math.PI/360))) * (ih/2);
      p += `M ${mx} ${y} L ${mx+iw} ${y} `;
    }
    paths = `<rect x="${mx}" y="${my}" width="${iw}" height="${ih}" fill="${land}" opacity="0.18"/>
             <path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <line x1="${mx}" y1="${my+ih/2}" x2="${mx+iw}" y2="${my+ih/2}" stroke="${eq}" stroke-width="1.2"/>`;
  }

  // ── TRANSVERSE MERCATOR / UTM ──
  else if (type === 'transverse_mercator') {
    // Narrow vertical strip — TM has low distortion near central meridian only
    const cx = w/2;
    let p = '';
    // Show curved meridians bowing away
    for (let lon = -180; lon <= 180; lon += 30) {
      const dx = (lon / 180) * (w * 0.46);
      const bow = Math.abs(dx) * 0.25;
      p += `M ${cx+dx} ${h*0.05} Q ${cx+dx+bow} ${h/2} ${cx+dx} ${h*0.95} `;
    }
    // straight parallels
    for (let lat = -90; lat <= 90; lat += 30) {
      const y = h/2 - (lat/90)*(h*0.45);
      p += `M ${w*0.05} ${y} L ${w*0.95} ${y} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <line x1="${w*0.05}" y1="${h/2}" x2="${w*0.95}" y2="${h/2}" stroke="${eq}" stroke-width="1.2"/>
             <rect x="${w/2-18}" y="${h*0.05}" width="36" height="${h*0.9}" fill="${eq}" opacity="0.08"/>`;
  }

  // ── PLATE CARREE ──
  else if (type === 'plate_carree') {
    const mx = w*0.08, my = h*0.08;
    const iw = w-mx*2, ih = h-my*2;
    let p = '';
    for (let lon = -180; lon <= 180; lon += 30) {
      const x = mx + (lon+180)/360*iw;
      p += `M ${x} ${my} L ${x} ${my+ih} `;
    }
    for (let lat = -90; lat <= 90; lat += 30) {
      const y = my + (90-lat)/180*ih;
      p += `M ${mx} ${y} L ${mx+iw} ${y} `;
    }
    paths = `<rect x="${mx}" y="${my}" width="${iw}" height="${ih}" fill="${land}" opacity="0.18"/>
             <path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <line x1="${mx}" y1="${my+ih/2}" x2="${mx+iw}" y2="${my+ih/2}" stroke="${eq}" stroke-width="1.2"/>`;
  }

  // ── ALBERS EQUAL AREA CONIC ──
  else if (type === 'albers') {
    const cx = w/2, cy = h*1.2;
    const r1 = h*0.95, r2 = h*1.45;
    let p = '';
    // arcs
    for (let i = 0; i <= 5; i++) {
      const r = r1 + (r2-r1)*i/5;
      const a1 = -65 * Math.PI/180;
      const a2 = -115 * Math.PI/180;
      const x1 = cx + r*Math.sin(-a1), y1 = cy - r*Math.cos(-a1);
      const x2 = cx + r*Math.sin(-a2), y2 = cy - r*Math.cos(-a2);
      p += `M ${x1} ${y1} A ${r} ${r} 0 0 0 ${x2} ${y2} `;
    }
    // radial lines
    for (let lon = -180; lon <= 180; lon += 30) {
      const a = (lon/360)*2*Math.PI;
      const x1 = cx + r1*Math.sin(a), y1 = cy - r1*Math.cos(a);
      const x2 = cx + r2*Math.sin(a), y2 = cy - r2*Math.cos(a);
      p += `M ${x1} ${y1} L ${x2} ${y2} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>`;
  }

  // ── LAMBERT CONFORMAL CONIC ──
  else if (type === 'lcc') {
    const cx = w/2, cy = h*1.35;
    const r1 = h*0.85, r2 = h*1.55;
    let p = '';
    for (let i = 0; i <= 5; i++) {
      const r = r1 + (r2-r1)*i/5;
      const span = 70 * Math.PI/180;
      const x1 = cx + r*Math.sin(-span), y1 = cy - r*Math.cos(-span);
      const x2 = cx + r*Math.sin(span),  y2 = cy - r*Math.cos(span);
      p += `M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} `;
    }
    for (let lon = -180; lon <= 180; lon += 30) {
      const a = (lon/360)*2*Math.PI * 0.55;
      const x1 = cx + r1*Math.sin(a), y1 = cy - r1*Math.cos(a);
      const x2 = cx + r2*Math.sin(a), y2 = cy - r2*Math.cos(a);
      p += `M ${x1} ${y1} L ${x2} ${y2} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>`;
  }

  // ── POLYCONIC ──
  else if (type === 'polyconic') {
    const cx = w/2;
    let p = '';
    // each parallel is a different small circle arc (bowed differently)
    for (let lat = -60; lat <= 60; lat += 20) {
      const y0 = h/2 - (lat/90)*(h*0.42);
      const bow = (1 - Math.abs(lat)/90) * w * 0.18;
      p += `M ${cx - w*0.44} ${y0 + bow*0.15} Q ${cx} ${y0 - bow*0.35} ${cx + w*0.44} ${y0 + bow*0.15} `;
    }
    // meridians curve outward
    for (let lon = -180; lon <= 180; lon += 30) {
      const dx = (lon/180) * w*0.44;
      const bow2 = Math.abs(dx) * 0.12;
      p += `M ${cx+dx} ${h*0.07} Q ${cx+dx - Math.sign(dx)*bow2} ${h/2} ${cx+dx} ${h*0.93} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <line x1="${w*0.06}" y1="${h/2}" x2="${w*0.94}" y2="${h/2}" stroke="${eq}" stroke-width="1.2"/>`;
  }

  // ── STEREOGRAPHIC ──
  else if (type === 'stereographic') {
    const cx = w/2, cy = h/2;
    let p = '';
    // circular parallels expanding outward
    for (let i = 1; i <= 5; i++) {
      const r = i * (Math.min(w,h)*0.085);
      p += `M ${cx+r} ${cy} A ${r} ${r} 0 1 0 ${cx-r} ${cy} A ${r} ${r} 0 1 0 ${cx+r} ${cy} `;
    }
    // straight meridians radiating from center
    for (let a = 0; a < 360; a += 30) {
      const rad = a * Math.PI/180;
      p += `M ${cx} ${cy} L ${cx + Math.cos(rad)*w*0.46} ${cy + Math.sin(rad)*h*0.46} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <circle cx="${cx}" cy="${cy}" r="3" fill="${eq}"/>`;
  }

  // ── ORTHOGRAPHIC ──
  else if (type === 'orthographic') {
    const cx = w/2, cy = h/2;
    const R = Math.min(w,h)*0.42;
    let p = '';
    p += `M ${cx+R} ${cy} A ${R} ${R} 0 1 0 ${cx-R} ${cy} A ${R} ${R} 0 1 0 ${cx+R} ${cy} `;
    for (let lat = -60; lat <= 60; lat += 30) {
      const ry = R * Math.sin(lat*Math.PI/180);
      const rx2 = R * Math.cos(lat*Math.PI/180);
      if (lat !== 0) {
        p += `M ${cx+rx2} ${cy-ry} A ${rx2} ${R*0.12} 0 1 0 ${cx-rx2} ${cy-ry} A ${rx2} ${R*0.12} 0 1 0 ${cx+rx2} ${cy-ry} `;
      }
    }
    for (let lon = -180; lon < 180; lon += 30) {
      const a = lon * Math.PI/180;
      const rx3 = R * Math.abs(Math.cos(a));
      p += `M ${cx + R*Math.sin(a)} ${cy-R} A ${rx3} ${R} 0 0 1 ${cx + R*Math.sin(a)} ${cy+R} `;
    }
    paths = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${land}" opacity="0.2"/>
             <path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${eq}" stroke-width="1.5"/>
             <line x1="${cx-R}" y1="${cy}" x2="${cx+R}" y2="${cy}" stroke="${eq}" stroke-width="1.0" opacity="0.6"/>`;
  }

  // ── AZIMUTHAL EQUIDISTANT ──
  else if (type === 'azimuthal_equidist') {
    const cx = w/2, cy = h/2;
    let p = '';
    for (let i = 1; i <= 5; i++) {
      const r = i * (Math.min(w,h) * 0.085);
      p += `M ${cx+r} ${cy} A ${r} ${r} 0 1 0 ${cx-r} ${cy} A ${r} ${r} 0 1 0 ${cx+r} ${cy} `;
    }
    for (let a = 0; a < 360; a += 30) {
      const rad = a * Math.PI/180;
      const R = Math.min(w,h)*0.44;
      p += `M ${cx} ${cy} L ${cx + Math.cos(rad)*R} ${cy + Math.sin(rad)*R} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <circle cx="${cx}" cy="${cy}" r="${Math.min(w,h)*0.44}" fill="none" stroke="${grid}" stroke-width="1.2"/>
             <circle cx="${cx}" cy="${cy}" r="3" fill="${eq}"/>`;
  }

  // ── LAMBERT AZIMUTHAL EQUAL AREA ──
  else if (type === 'laea') {
    const cx = w/2, cy = h/2;
    let p = '';
    for (let i = 1; i <= 5; i++) {
      const r = i * (Math.min(w,h) * 0.085);
      p += `M ${cx+r} ${cy} A ${r} ${r} 0 1 0 ${cx-r} ${cy} A ${r} ${r} 0 1 0 ${cx+r} ${cy} `;
    }
    for (let a = 0; a < 360; a += 30) {
      const rad = a * Math.PI/180;
      const R = Math.min(w,h)*0.44;
      p += `M ${cx} ${cy} L ${cx + Math.cos(rad)*R} ${cy + Math.sin(rad)*R} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <circle cx="${cx}" cy="${cy}" r="${Math.min(w,h)*0.44}" fill="none" stroke="${eq}" stroke-width="1.4"/>
             <circle cx="${cx}" cy="${cy}" r="3" fill="${eq}"/>`;
  }

  // ── GNOMONIC ──
  else if (type === 'gnomonic') {
    const cx = w/2, cy = h/2;
    let p = '';
    // small view circle (only < 90deg from center)
    const R = Math.min(w,h)*0.42;
    // parallels are hyperbolas — approximate with compressed circles
    for (let i = 1; i <= 4; i++) {
      const r = i * R / 4.2;
      p += `M ${cx+r} ${cy} A ${r} ${r} 0 1 0 ${cx-r} ${cy} A ${r} ${r} 0 1 0 ${cx+r} ${cy} `;
    }
    // straight line meridians
    for (let a = 0; a < 360; a += 30) {
      const rad = a * Math.PI/180;
      p += `M ${cx} ${cy} L ${cx + Math.cos(rad)*R} ${cy + Math.sin(rad)*R} `;
    }
    paths = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${land}" opacity="0.12" stroke="${eq}" stroke-width="1.2"/>
             <path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <circle cx="${cx}" cy="${cy}" r="3" fill="${eq}"/>`;
  }

  // ── MOLLWEIDE ──
  else if (type === 'mollweide') {
    const cx = w/2, cy = h/2;
    const a = w*0.45, b = h*0.44;
    let p = '';
    p += `M ${cx+a} ${cy} A ${a} ${b} 0 1 0 ${cx-a} ${cy} A ${a} ${b} 0 1 0 ${cx+a} ${cy} `;
    for (let lat = -60; lat <= 60; lat += 30) {
      const fy = b * Math.sin(lat*Math.PI/180) * 1.25;
      const fx = a * Math.cos(Math.asin(cl(fy/b, -1, 1)));
      p += `M ${cx-fx} ${cy-fy} L ${cx+fx} ${cy-fy} `;
    }
    for (let lon = -180; lon < 180; lon += 30) {
      const xf = (lon/180) * a;
      p += `M ${xf+cx} ${cy-b} A ${a*0.1} ${b} 0 0 1 ${xf+cx} ${cy+b} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <ellipse cx="${cx}" cy="${cy}" rx="${a}" ry="${b}" fill="none" stroke="${eq}" stroke-width="1.4"/>
             <line x1="${cx-a}" y1="${cy}" x2="${cx+a}" y2="${cy}" stroke="${eq}" stroke-width="1.0"/>`;
  }

  // ── ROBINSON ──
  else if (type === 'robinson') {
    const cx = w/2, cy = h/2;
    const W = w*0.44, H = h*0.44;
    // Robinson table approximate Y and X-width factors
    const rTab = [
      [90,0.532,0.0],[80,0.605,0.62],[70,0.660,0.747],[60,0.700,0.828],
      [50,0.731,0.888],[40,0.754,0.933],[30,0.768,0.967],[20,0.776,0.988],
      [10,0.779,0.999],[0,0.779,1.0]
    ];
    // parallels
    let p = '';
    for (let i = 0; i < rTab.length; i++) {
      const [lat, yf, xf] = rTab[i];
      const y = cy - yf*H; const x2 = xf*W;
      p += `M ${cx-x2} ${y} L ${cx+x2} ${y} `;
      if (lat > 0) { p += `M ${cx-x2} ${cy+yf*H} L ${cx+x2} ${cy+yf*H} `; }
    }
    // meridians curve slightly
    for (let lon = -180; lon <= 180; lon += 30) {
      const xf2 = lon/180;
      let pts = '';
      for (let i = rTab.length-1; i >= 0; i--) {
        const [lat2, yf2, xf3] = rTab[i];
        const x3 = cx + xf2*xf3*W;
        const y3 = cy - yf2*H;
        pts += (i === rTab.length-1 ? `M ${x3} ${y3}` : ` L ${x3} ${y3}`);
      }
      for (let i = 1; i < rTab.length; i++) {
        const [lat3, yf3, xf4] = rTab[i];
        const x4 = cx + xf2*xf4*W;
        const y4 = cy + yf3*H;
        pts += ` L ${x4} ${y4}`;
      }
      p += pts + ' ';
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <line x1="${cx - W}" y1="${cy}" x2="${cx + W}" y2="${cy}" stroke="${eq}" stroke-width="1.2"/>`;
  }

  // ── WINKEL TRIPEL ──
  else if (type === 'winkel_tripel') {
    const cx = w/2, cy = h/2;
    const W = w*0.44, H = h*0.42;
    let p = '';
    // Approximation: similar to Aitoff but slightly less bowed
    for (let lat = -90; lat <= 90; lat += 30) {
      const yp = (lat/90) * H;
      const xw = W * Math.cos(lat*Math.PI/180 * 0.5);
      p += `M ${cx-xw} ${cy-yp} L ${cx+xw} ${cy-yp} `;
    }
    for (let lon = -180; lon <= 180; lon += 30) {
      const pts2 = [];
      for (let lat2 = -90; lat2 <= 90; lat2 += 10) {
        const sinc_arg = Math.cos(lat2*Math.PI/180) * Math.cos(lon*Math.PI/360);
        const sinc_val = Math.abs(sinc_arg) < 0.001 ? 1 : Math.asin(cl(sinc_arg,-1,1)) / sinc_arg;
        const xp = cx + (lon*Math.PI/360) * Math.cos(lat2*Math.PI/180) * sinc_val * W * 0.95
                      + (lon/180) * W * 0.5;
        const xavg = xp / 2;
        const yp2 = cy - (lat2/90)*H;
        pts2.push(`${cx + (lon/180)*W*0.75 + Math.cos(lat2*Math.PI/180)*(lon/180)*W*0.18} ${yp2}`);
      }
      p += `M ${pts2.join(' L ')} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.75" fill="none"/>
             <line x1="${cx-W*0.96}" y1="${cy}" x2="${cx+W*0.96}" y2="${cy}" stroke="${eq}" stroke-width="1.2"/>`;
  }

  // ── GOODE'S HOMOLOSINE ──
  else if (type === 'goodes') {
    const cx = w/2, cy = h/2;
    const W = w*0.44, H = h*0.44;
    let p = '';
    // Two ellipses — interrupted projection (lobes)
    const lobes = [-0.52, -0.15, 0.22, 0.6];
    for (const lo of lobes) {
      const lx = cx + lo*W*1.2;
      p += `M ${lx+W*0.26} ${cy} A ${W*0.26} ${H*0.44} 0 1 0 ${lx-W*0.26} ${cy} A ${W*0.26} ${H*0.44} 0 1 0 ${lx+W*0.26} ${cy} `;
      for (let lat2 = -60; lat2 <= 60; lat2 += 30) {
        const yp = (lat2/90)*H*0.44;
        const xw2 = W*0.24*Math.cos(lat2*Math.PI/180);
        p += `M ${lx-xw2} ${cy-yp} L ${lx+xw2} ${cy-yp} `;
      }
    }
    p += `M ${cx-W} ${cy} L ${cx+W} ${cy} `;
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <line x1="${cx-W}" y1="${cy}" x2="${cx+W}" y2="${cy}" stroke="${eq}" stroke-width="1.2"/>`;
  }

  // ── ALASKA STATE PLANE ──
  else if (type === 'alaska_sp') {
    // Oblique Mercator feel — zones shown as narrow bands
    const cx = w/2, cy = h/2;
    let p = '';
    const zones = [-0.55, -0.22, 0.11, 0.44];
    for (let i = 0; i < zones.length; i++) {
      const ox = cx + zones[i]*w*0.4;
      const tilt = (i - 1.5) * 0.15;
      for (let lat3 = -60; lat3 <= 60; lat3 += 20) {
        const y0 = cy - (lat3/90)*h*0.42;
        p += `M ${ox - w*0.06} ${y0 + tilt*h*0.3} L ${ox + w*0.06} ${y0 - tilt*h*0.3} `;
      }
      p += `M ${ox} ${h*0.06} L ${ox} ${h*0.94} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.8" fill="none"/>
             <line x1="${w*0.06}" y1="${cy}" x2="${w*0.94}" y2="${cy}" stroke="${eq}" stroke-width="1.2"/>`;
  }

  // ── ALASKA ALBERS (EPSG:3338) ──
  else if (type === 'alaska_albers') {
    // Conic centred on ~154°W, standard parallels 55°N & 65°N
    const cx = w*0.52, cy = h*1.1;
    const r1 = h*0.75, r2 = h*1.2;
    let p = '';
    for (let i = 0; i <= 5; i++) {
      const r = r1 + (r2-r1)*i/5;
      const span = 62 * Math.PI/180;
      const x1 = cx + r*Math.sin(-span), y1 = cy - r*Math.cos(-span);
      const x2 = cx + r*Math.sin(span),  y2 = cy - r*Math.cos(span);
      p += `M ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} `;
    }
    for (let lon = -210; lon <= -100; lon += 20) {
      const a = ((lon+154)/180)*Math.PI * 0.9;
      const x1 = cx + r1*Math.sin(a), y1 = cy - r1*Math.cos(a);
      const x2 = cx + r2*Math.sin(a), y2 = cy - r2*Math.cos(a);
      p += `M ${x1} ${y1} L ${x2} ${y2} `;
    }
    paths = `<path d="${p}" stroke="${grid}" stroke-width="0.9" fill="none"/>
             <path d="${p.split('M').slice(0,4).map(s => 'M'+s).join('')}" stroke="${eq}" stroke-width="1.5" fill="none" opacity="0.5"/>`;
  }

  // fallback rectangle
  else {
    paths = `<rect x="${w*0.08}" y="${h*0.08}" width="${w*0.84}" height="${h*0.84}" fill="none" stroke="${grid}" stroke-width="0.8"/>`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <rect width="${w}" height="${h}" fill="${bg}"/>
    ${paths}
  </svg>`;
}

// Group projections by family for left-column rendering
const FAMILIES = ['Cylindrical','Conic','Azimuthal','Pseudocylindrical','Alaska-Specific'];

// ============================================================
//  RENDER LEFT COLUMN
// ============================================================
function renderList() {
  const el = document.getElementById('projList');
  let html = '';
  for (const fam of FAMILIES) {
    const items = PROJECTIONS.filter(p => p.family === fam);
    if (!items.length) continue;
    html += `<div class="family-header">${fam}</div>`;
    for (const p of items) {
      html += `<div class="proj-item" data-id="${p.id}" onclick="selectProj('${p.id}')">
        ${p.name}
        <span class="proj-tag">${p.classification}</span>
      </div>`;
    }
  }
  el.innerHTML = html;
}

// ============================================================
//  RENDER CENTER + RIGHT COLUMNS
// ============================================================
let currentId = null;

function selectProj(id) {
  if (currentId === id) return;
  currentId = id;

  // Update active state in list
  document.querySelectorAll('.proj-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  const p = PROJECTIONS.find(x => x.id === id);
  if (!p) return;

  // ── CENTER ──
  const thumbSVG = makeSVG(p.svg, 200, 150);
  document.getElementById('projDetail').innerHTML = `
    <h2>${p.name}</h2>
    <div class="proj-subtitle">${p.subtitle}</div>
    <div class="thumbnail-wrap" onclick="openLightbox('${p.svg}')">
      ${thumbSVG}
    </div>
    <p class="zoom-hint">&#128269; Click graticule to enlarge</p>
    <div class="section-block">
      <h3>Construction</h3>
      <p>${p.construction}</p>
    </div>
    <div class="section-block">
      <h3>Distortion Characteristics</h3>
      <p>${p.distortion}</p>
    </div>
    <div class="section-block">
      <h3>Canonical Use Cases</h3>
      <p>${p.useCases}</p>
    </div>
  `;

  // ── RIGHT ──
  const epsgHTML = p.epsg.map(e => `<code>${e}</code>`).join(' ');
  const pillHTML = p.distortionTags.map(t =>
    `<span class="distort-pill ${t.cls}">${t.label}</span>`
  ).join('');

  const akHTML = p.alaska
    ? `<div class="alaska-note"><div class="ak-label">&#9660; Alaska Relevance</div><p>${p.alaska}</p></div>`
    : '';

  document.getElementById('projMeta').innerHTML = `
    <div class="meta-card">
      <h3>Quick Reference</h3>
      <div class="meta-row">
        <span class="meta-label">Family</span>
        <span class="meta-value">${p.family}</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Type</span>
        <span class="meta-value">${p.classification}</span>
      </div>
      <div class="distortion-bar">
        <div class="distort-label">Distortion Profile</div>
        ${pillHTML}
      </div>
      <div class="meta-row" style="margin-top:0.8rem">
        <span class="meta-label">EPSG</span>
        <span class="meta-value epsg">${epsgHTML}</span>
      </div>
      ${akHTML}
    </div>
  `;
}

// ============================================================
//  LIGHTBOX
// ============================================================
function openLightbox(svgType) {
  const lb = document.getElementById('lightbox');
  const inner = document.getElementById('lbInner');
  // Remove old SVG if present
  const old = inner.querySelector('svg');
  if (old) old.remove();
  const big = makeSVG(svgType, 600, 450);
  inner.insertAdjacentHTML('beforeend', big);
  lb.classList.add('open');
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
document.getElementById('lbClose').addEventListener('click', function() {
  document.getElementById('lightbox').classList.remove('open');
});

// ============================================================
//  INIT
// ============================================================
renderList();
selectProj('mercator');
</script>
